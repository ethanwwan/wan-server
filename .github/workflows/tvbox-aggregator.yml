name: TVBox Aggregator

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行 TVBox 聚合
        run: |
          python tvbox-aggregator/scripts/tvbox_aggregator.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: 提交并推送更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tvbox-aggregator/output/
          if git diff --staged --quiet; then
            echo "没有更改，跳过提交"
          else
            git commit -m "chore: 自动更新 TVBox 配置 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
