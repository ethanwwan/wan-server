name: Scheduler JOB

on:
  schedule:
    # 每天 22 点执行 (UTC 时间 14:00 = 北京时间 22:00)
    - cron: '0 14 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许推送更改到仓库

jobs:
  update-configs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 安装 FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 执行统一调度任务
        run: |
          python scripts/run_all_schedulers.py
        env:
          PYTHONPATH: ${{ github.workspace }}
      
      - name: 提交并推送更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有未暂存的更改
          if ! git diff --quiet; then
            echo "检测到未暂存更改，先暂存"
            git stash push -m "auto-stash before pull"
            HAS_STASH=true
          else
            HAS_STASH=false
          fi
          
          # 拉取远程最新代码
          git pull --rebase origin main
          
          # 如果之前有暂存，恢复暂存的更改
          if [ "$HAS_STASH" = true ]; then
            git stash pop || echo "恢复暂存失败，可能没有stash"
          fi
          
          # 添加并提交更改
          git add output/
          if git diff --staged --quiet; then
            echo "没有更改，跳过提交"
          else
            git commit -m "chore: 自动更新配置 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 同步 output 目录到 Gist
        if: secrets.GIST_ID != '' && secrets.GIST_TOKEN != ''
        run: |
          python scripts/sync_to_gist.py --gist-id ${{ secrets.GIST_ID }} --token ${{ secrets.GIST_TOKEN }}
        env:
          PYTHONPATH: ${{ github.workspace }}
