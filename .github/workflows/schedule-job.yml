name: Scheduler JOB

on:
  schedule:
    # 每天 0 点执行 (UTC 16:00 = 北京时间 00:00)
    - cron: '0 16 * * *'
    # 每天 6 点执行 (UTC 22:00 = 北京时间 06:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write  # 允许推送更改到仓库

jobs:
  update-configs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 安装 FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 执行聚合任务
        run: |
          python scripts/run_all_schedulers.py
        env:
          PYTHONPATH: ${{ github.workspace }}
      
      - name: 同步配置到 NAS 目录
        run: |
          python nas-server/schedulers/tvbox_scheduler.py
        env:
          PYTHONPATH: ${{ github.workspace }}
      
      - name: 提交并推送更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add iptv-aggregator/output/ tvbox-aggregator/output/ nas-server/output/
          if git diff --staged --quiet; then
            echo "没有更改，跳过提交"
          else
            git commit -m "chore: 自动更新配置 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
