name: Sync to Gist

on:
  workflow_dispatch:
    description: "手动同步 output 目录到 Gist"

permissions:
  contents: read

jobs:
  sync-gist:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
      
      - name: 同步到 Gist
        if: env.GIST_ID != '' && env.GIST_TOKEN != ''
        run: |
          python scripts/sync_to_gist.py --gist-id ${{ secrets.GIST_ID }} --token ${{ secrets.GIST_TOKEN }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      
      - name: 检查 Secrets 是否配置
        if: env.GIST_ID == '' || env.GIST_TOKEN == ''
        run: |
          echo "错误：GIST_ID 或 GIST_TOKEN 未配置，请在仓库 Secrets 中添加这两个值"
          exit 1
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}