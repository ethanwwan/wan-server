services:
  wan-server:
    image: docker.io/ethanwwan/wan-server:latest
    container_name: wan-server
    ports:
      - "8166:8166"
    
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - /root/.docker/config.json:/root/.docker/config.json

    restart: always
    networks:
      - web_network

networks:
  web_network:
    external: true