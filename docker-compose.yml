services:
  api-server:
    image: docker.io/ethanwwan/api-server:latest
    container_name: api-server
    ports:
      - "8166:8166"
    
    volumes:
      - ./public:/app/public
      - /root/.docker/config.json:/root/.docker/config.json
      
    environment:
      - PLAYLIST_URL=http://192.168.1.12:8032/static/output/playlist.m3u
      - MIGU_URL=http://192.168.1.12:8015/migu
      - OTT_URL=https://live.ottiptv.cc/iptv.m3u?userid=7755950497&sign=b7578005974939b989b3895b921110bcb06c83ed6f42b7139ba8b94c719484c980303585b7a1ffcc75c631fb0e9e8cd3983d6dc87447c558c9dc7770f76795671c177a0ad46048&auth_token=17b0d6712a2beb7e9bfea802dc9d33a3
      - FAVORITE_CHANNELS=CCTV1综合,CCTV2财经,CCTV3综艺,CCTV5体育,CCTV6电影,CCTV8电视剧,CCTV13新闻

    restart: always
    networks:
      - web_network

networks:
  web_network:
    external: true