services:
  wan-server:
    image: ethanwwan/wan-server:latest
    container_name: wan-server
    ports:
      - "8166:8016"
    
    volumes:
      - ./output:/app/output
      - ./input:/app/input
    
    environment:
      - TZ=Asia/Shanghai
    
    restart: always
    networks:
      - web_network

networks:
  web_network:
    external: true