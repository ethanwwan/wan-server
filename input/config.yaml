# 应用配置
app:
  env: prod
  debug: false

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8016

# 调度任务配置
scheduler:
  - id: tvbox_job
    name: TVBox 配置更新
    func: scheduler.tvbox_scheduler.tvbox_scheduler
    hour: 0
    minute: 10
  
  - id: iptv_job
    name: IPTV 配置更新
    func: scheduler.iptv_scheduler.iptv_scheduler
    hour: 0
    minute: 20

# TVBox 配置
tvbox:
  url: "https://www.iyouhun.com/tv/dc"

# IPTV 配置
iptv:
  migu_url: "http://192.168.1.12:8015/migu"
